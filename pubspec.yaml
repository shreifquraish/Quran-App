name: al_quran_kareem
description: تطبيق القرآن الكريم - قراءة واستماع بدون إنترنت
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.6.0
  dio: ^5.7.0
  provider: ^6.1.2
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  just_audio: ^0.9.40
  audio_session: ^0.1.21
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  page_flip_builder: ^0.1.4
  page_flip: ^0.2.5+1
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  font_awesome_flutter: 10.7.0
  qcf_quran_lite:
    path: packages/qcf_quran_lite
  scrollable_positioned_list: ^0.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/img/logggooo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/data/surahs.json
    - assets/data/tafsir.json
    # - assets/read/  # removed to keep APK small; images downloaded on first run


